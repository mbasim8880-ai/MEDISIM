<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediSim 3D Anatomy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a1520; overflow:hidden; font-family:"Nunito",sans-serif; }
canvas { display:block; }
#loading {
  position:fixed; inset:0; background:#0a1520;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999; gap:16px;
}
.load-logo { font-size:28px; font-weight:900; color:#fff; letter-spacing:-1px; }
.load-logo span { color:#e53e3e; }
.load-sub { font-size:12px; color:#3a6a8a; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-top:-8px; }
.bar-bg { width:240px; height:6px; background:rgba(255,255,255,0.06); border-radius:99px; }
.bar-fill { height:6px; background:linear-gradient(90deg,#e53e3e,#ff6b6b); border-radius:99px; width:0%; transition:width 0.3s; }
#load-txt { color:#4a8aaa; font-size:12px; font-weight:700; }
#switch-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(8,16,26,0.85); backdrop-filter:blur(6px);
  align-items:center; justify-content:center; flex-direction:column; gap:14px;
}
#switch-overlay.show { display:flex; }
.spinner { width:44px; height:44px; border:3px solid rgba(255,255,255,0.06); border-top-color:#e53e3e; border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#switch-txt { color:#fff; font-size:13px; font-weight:800; }
#no-model {
  display:none; position:fixed; inset:0; z-index:150;
  align-items:center; justify-content:center; flex-direction:column; gap:10px;
  pointer-events:none;
}
#no-model.show { display:flex; }
#no-model .nm-icon { font-size:52px; }
#no-model .nm-txt { color:#2a4a6a; font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
.top-bar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  padding:14px 16px 10px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg, rgba(8,16,26,0.95) 0%, transparent 100%);
}
.app-title { font-size:16px; font-weight:900; color:#fff; }
.app-title span { color:#e53e3e; }
.cat-label {
  font-size:11px; font-weight:800; color:#5ab0f0;
  text-transform:uppercase; letter-spacing:1px;
  background:rgba(90,176,240,0.1); border:1px solid rgba(90,176,240,0.2);
  border-radius:8px; padding:4px 10px;
}
.model-switcher { position:fixed; top:60px; left:16px; z-index:100; }
.circle-btn {
  width:44px; height:44px; border-radius:50%;
  background:rgba(10,21,32,0.95); border:1.5px solid rgba(100,180,255,0.2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(10px); transition:all 0.2s;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.circle-btn:hover { border-color:#5ab0f0; }
.circle-btn svg { width:18px; height:18px; fill:#5ab0f0; }
.model-list {
  display:none; margin-top:8px;
  background:rgba(10,21,32,0.98); border:1px solid rgba(100,180,255,0.15);
  border-radius:14px; overflow:hidden; backdrop-filter:blur(12px);
  min-width:155px; box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.model-list.show { display:block; }
.model-item {
  padding:12px 16px; font-size:13px; font-weight:800; color:#5a8aaa;
  cursor:pointer; border-bottom:1px solid rgba(100,180,255,0.06);
  transition:all 0.15s; display:flex; align-items:center; gap:10px;
}
.model-item:last-child { border-bottom:none; }
.model-item:hover { background:rgba(90,176,240,0.08); color:#a0d0f0; }
.model-item.active { color:#fff; background:rgba(229,62,62,0.1); }
.model-dot { width:7px; height:7px; border-radius:50%; background:#e53e3e; opacity:0; flex-shrink:0; }
.model-item.active .model-dot { opacity:1; }
.zoom-btns {
  position:fixed; right:16px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:8px; z-index:100;
}
.zoom-btn {
  width:42px; height:42px; border-radius:50%;
  background:rgba(10,21,32,0.95); border:1.5px solid rgba(100,180,255,0.2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(10px);
  font-size:22px; color:#5ab0f0; font-weight:900; line-height:1;
  transition:all 0.2s; user-select:none;
}
.zoom-btn:hover { border-color:#5ab0f0; color:#fff; }
.zoom-btn:active { transform:scale(0.9); }
#hint {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:rgba(8,16,26,0.85); border:1px solid rgba(100,180,255,0.12);
  border-radius:10px; padding:7px 16px; font-size:11px; color:#3a6a8a;
  font-weight:700; pointer-events:none; backdrop-filter:blur(6px);
  white-space:nowrap; transition:opacity 2s; z-index:50;
}
.tabs {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(8,16,26,0.98); border-top:1px solid rgba(100,180,255,0.08);
  display:flex; backdrop-filter:blur(12px);
}
.tab {
  flex:1; padding:10px 2px 8px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; border:none; background:transparent;
  color:#1e3a52; font-family:"Nunito",sans-serif;
  font-size:8.5px; font-weight:900; text-transform:uppercase;
  letter-spacing:0.3px; transition:all 0.2s; border-top:2px solid transparent;
}
.tab:hover { color:#3a6a8a; }
.tab.active { color:#fff; border-top-color:#e53e3e; }
.tab.active .tab-icon { filter:drop-shadow(0 0 6px rgba(229,62,62,0.5)); }
.tab-icon { font-size:20px; }
</style>
</head>
<body>
<div id="loading">
  <div class="load-logo">Medi<span>Sim</span></div>
  <div class="load-sub">3D Anatomy Explorer</div>
  <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
  <div id="load-txt">Initializing...</div>
</div>
<div id="switch-overlay">
  <div class="spinner"></div>
  <div id="switch-txt">Loading...</div>
</div>
<div id="no-model">
  <div class="nm-icon">🔜</div>
  <div class="nm-txt">Coming Soon</div>
</div>
<div class="top-bar">
  <div class="app-title">Medi<span>Sim</span></div>
  <div class="cat-label" id="cat-label">Skeleton</div>
</div>
<div class="model-switcher">
  <div class="circle-btn" onclick="toggleList()">
    <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="2.5" rx="1.25"/><rect x="3" y="10.75" width="18" height="2.5" rx="1.25"/><rect x="3" y="15.5" width="18" height="2.5" rx="1.25"/></svg>
  </div>
  <div class="model-list" id="model-list">
    <div class="model-item active" onclick="switchModel(0)"><div class="model-dot"></div>Model 1</div>
    <div class="model-item" onclick="switchModel(1)"><div class="model-dot"></div>Model 2</div>
    <div class="model-item" onclick="switchModel(2)"><div class="model-dot"></div>Model 3</div>
  </div>
</div>
<div id="hint">🖱️ Drag to rotate · Scroll to zoom</div>
<div class="zoom-btns">
  <div class="zoom-btn" id="zoom-in">+</div>
  <div class="zoom-btn" id="zoom-out">−</div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'skeleton','Skeleton')"><span class="tab-icon">🦴</span>Skeleton</button>
  <button class="tab" onclick="switchTab(this,'brain','Brain')"><span class="tab-icon">🧠</span>Brain</button>
  <button class="tab" onclick="switchTab(this,'eye','Eye')"><span class="tab-icon">👁️</span>Eye</button>
  <button class="tab" onclick="switchTab(this,'organs','Organs')"><span class="tab-icon">🫀</span>Organs</button>
  <button class="tab" onclick="switchTab(this,'spine','Spine')"><span class="tab-icon">🔗</span>Spine</button>
  <button class="tab" onclick="switchTab(this,'bodypart','Body Part')"><span class="tab-icon">💪</span>Body Part</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>

const MODELS = {
  skeleton: ['default skeleton.glb', 'skeleton_model_2-optimized.glb', null],
  brain:    ['default brain.glb', null, null],
  eye:      ['default_eye.glb', 'eye_model_2_glb.glb', null],
  organs:   ['heart -optimized.glb', 'default lungs.glb', null],
  spine:    ['default spine .glb', null, null],
  bodypart: ['default_body_part.glb', null, null],
};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1520);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 0, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const key = new THREE.DirectionalLight(0xffffff, 1.1);
key.position.set(5, 15, 10); scene.add(key);
const fill = new THREE.DirectionalLight(0x6699cc, 0.5);
fill.position.set(-10, 5, -10); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.3);
rim.position.set(0, -10, -15); scene.add(rim);
const front = new THREE.DirectionalLight(0xffffff, 0.4);
front.position.set(0, 0, 20); scene.add(front);

// DRACOLoader setup
const dracoLoader = new THREE.DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');

// GLTFLoader with DRACO
const gltfLoader = new THREE.GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let currentModel=null, isDrag=false, prevX=0, prevY=0;
let currentCat='skeleton', currentIdx=0;
let zoomDist=4, tp=null, lastPinchDist=null;
const ZOOM_MIN=0.2, ZOOM_MAX=18, ZOOM_STEP=0.25;

function applyZoom(){ camera.position.z=zoomDist; }

window.addEventListener('wheel', e=>{
  e.preventDefault();
  zoomDist=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoomDist+e.deltaY*0.005));
  applyZoom();
},{passive:false});
document.getElementById('zoom-in').addEventListener('click',()=>{ zoomDist=Math.max(ZOOM_MIN,zoomDist-ZOOM_STEP); applyZoom(); });
document.getElementById('zoom-out').addEventListener('click',()=>{ zoomDist=Math.min(ZOOM_MAX,zoomDist+ZOOM_STEP); applyZoom(); });

renderer.domElement.addEventListener('mousedown',e=>{ isDrag=true; prevX=e.clientX; prevY=e.clientY; });
window.addEventListener('mouseup',()=>isDrag=false);
window.addEventListener('mousemove',e=>{
  if(!isDrag||!currentModel) return;
  currentModel.rotation.y+=(e.clientX-prevX)*0.008;
  currentModel.rotation.x+=(e.clientY-prevY)*0.004;
  prevX=e.clientX; prevY=e.clientY;
});

renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===2) lastPinchDist=null;
  else tp={x:e.touches[0].clientX,y:e.touches[0].clientY};
});
renderer.domElement.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastPinchDist!==null){ zoomDist=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoomDist+(lastPinchDist-dist)*0.01)); applyZoom(); }
    lastPinchDist=dist;
  } else if(e.touches.length===1&&tp&&currentModel){
    currentModel.rotation.y+=(e.touches[0].clientX-tp.x)*0.008;
    currentModel.rotation.x+=(e.touches[0].clientY-tp.y)*0.004;
    tp={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
});
renderer.domElement.addEventListener('touchend',()=>{ tp=null; lastPinchDist=null; });
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

function fixMaterials(model){
  model.traverse(child=>{
    if(child.isMesh){
      const mats=Array.isArray(child.material)?child.material:[child.material];
      mats.forEach(mat=>{
        mat.side=THREE.DoubleSide;
        if(mat.transparent||(mat.opacity!==undefined&&mat.opacity<1)){
          mat.transparent=true;
          mat.depthWrite=false;
        }
        mat.needsUpdate=true;
      });
    }
  });
}

function loadGLB(filename, isFirst){
  return new Promise((resolve,reject)=>{
    if(isFirst) setBar(40,'Loading model...');
    gltfLoader.load(filename, gltf=>{
      const model=gltf.scene;
      fixMaterials(model);
      const box=new THREE.Box3().setFromObject(model);
      const center=box.getCenter(new THREE.Vector3());
      const size=box.getSize(new THREE.Vector3());
      model.position.sub(center);
      model.scale.setScalar(2.5/Math.max(size.x,size.y,size.z));
      resolve(model);
    }, xhr=>{
      if(isFirst&&xhr.total) setBar(40+(xhr.loaded/xhr.total)*55,'Loading... '+Math.round(xhr.loaded/xhr.total*100)+'%');
    }, reject);
  });
}

async function showModel(cat,idx,isFirst=false){
  const filename=MODELS[cat][idx];
  if(!filename){
    if(currentModel){ scene.remove(currentModel); currentModel=null; }
    document.getElementById('no-model').classList.add('show');
    document.getElementById('switch-overlay').classList.remove('show');
    return;
  }
  document.getElementById('no-model').classList.remove('show');
  try{
    const model=await loadGLB(filename,isFirst);
    if(currentModel) scene.remove(currentModel);
    scene.add(model); currentModel=model;
    zoomDist=4; applyZoom();
    if(isFirst){
      setBar(100,'Ready!');
      await sleep(400);
      document.getElementById('loading').style.display='none';
      setTimeout(()=>document.getElementById('hint').style.opacity='0',5000);
    } else {
      document.getElementById('switch-overlay').classList.remove('show');
    }
  } catch(e){
    console.error(e);
    document.getElementById('switch-overlay').classList.remove('show');
  }
}

function switchModel(idx){
  currentIdx=idx;
  document.querySelectorAll('.model-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('model-list').classList.remove('show');
  document.getElementById('switch-overlay').classList.add('show');
  document.getElementById('switch-txt').textContent='Loading Model '+(idx+1)+'...';
  showModel(currentCat,idx);
}
function switchTab(el,cat,label){
  currentCat=cat; currentIdx=0;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.model-item').forEach((m,i)=>m.classList.toggle('active',i===0));
  document.getElementById('model-list').classList.remove('show');
  document.getElementById('cat-label').textContent=label;
  document.getElementById('switch-overlay').classList.add('show');
  document.getElementById('switch-txt').textContent='Loading '+label+'...';
  showModel(cat,0);
}
function toggleList(){ document.getElementById('model-list').classList.toggle('show'); }
window.addEventListener('click',e=>{ if(!e.target.closest('.model-switcher')) document.getElementById('model-list').classList.remove('show'); });
function setBar(pct,txt){ document.getElementById('bar').style.width=pct+'%'; document.getElementById('load-txt').textContent=txt; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function animate(){ requestAnimationFrame(animate); if(currentModel&&!isDrag) currentModel.rotation.y+=0.0015; renderer.render(scene,camera); }

setBar(20,'Initializing...');
showModel('skeleton',0,true).then(()=>animate());
</script>
</body>
</html>
